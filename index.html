<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Final Approach — you are the tower</title>
    <meta name="description" content="Real-time air traffic control. Land the arrivals, launch the departures, keep everyone apart — a 6-minute shift, graded. Build your airport empire!" />
    <meta name="theme-color" content="#E8F0FE" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Final Approach — you are the tower" />
    <meta property="og:description" content="Real-time air traffic control in the browser. Land arrivals, launch departures, buy new runways, dodge storms. Two crashes and you're fired." />
    <!-- Inter is self-hosted; the build inlines the woff2 (zero external font requests). -->
    <link rel="stylesheet" href="/src/fonts.css" />
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23E8F0FE'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%234A90D9' stroke-opacity='0.35' stroke-width='2'/%3E%3Ccircle cx='32' cy='32' r='12' fill='none' stroke='%234A90D9' stroke-opacity='0.5' stroke-width='2'/%3E%3Cpath d='M32 32 L50 18' stroke='%234A90D9' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='42' cy='40' r='4' fill='%234A90D9'/%3E%3C/svg%3E" />
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #E8F0FE;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }
      #app { position: fixed; inset: 0; }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
        cursor: crosshair;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      noscript { color: #2D3748; display: block; padding: 2rem; font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body>
    <div id="app"><canvas id="game"></canvas></div>
    <noscript>Final Approach needs JavaScript — it's a real-time air traffic control game.</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
